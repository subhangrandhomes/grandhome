services:
  - type: web
    name: grandhome-api
    env: node
    region: ohio
    plan: free
    buildCommand: pnpm install && pnpm run typecheck:libs && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
